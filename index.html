<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs Miner Pro</title>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { padding: 20px; }
        .balance-card { background: #222; padding: 20px; border-radius: 15px; margin: 20px; border: 1px solid #444; }
        #dogs-balance { font-size: 30px; color: orange; font-weight: bold; }
        button { width: 80%; padding: 12px; margin: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-claim { background: green; color: white; }
        .btn-withdraw { background: blue; color: white; }
        .btn-login { background: orange; color: white; margin-top: 15px; }
        input { width: 80%; padding: 12px; margin: 10px; border-radius: 8px; border: none; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Dogs Miner Login</h2>
        <p style="color: #bbb;">Save your progress online</p>
        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button class="btn-login" onclick="handleAuth()">Login / Create Account</button>
        <p id="auth-msg" style="color: red; font-size: 13px;"></p>
    </div>

    <div class="container">
        <h1>DOGS MINER</h1>
        
        <div class="balance-card">
            <p>Main Balance</p>
            <div id="dogs-balance">0.0000</div>
            <p style="font-size: 14px; color: #888;">Pending: <span id="pending-balance">0.0000</span> DOGS</p>
        </div>

        <div style="background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
            <p>Power: <span id="gh-power">100</span> GH/s</p>
            <p>Referrals: <span id="ref-count">0</span></p>
        </div>

        <button class="btn-claim" onclick="claimDogs()">Claim Mining</button>
        <button class="btn-withdraw" onclick="processWithdraw()">Withdraw (Min 50 DOGS)</button>
        
        <button style="background: #444; color: white;" onclick="alert('Link Copied!')">Invite Friends</button>
    </div>

    <script>
        // --- কনফিগারেশন ---
        const SERVER_URL = "https://dogs-miner-app.onrender.com"; // আপনার রেন্ডার ইউআরএল
        let userId = "";
        let dogsBalance = 0;
        let pendingBalance = 0;
        let ghPower = 100;
        let refCount = 0;

        // --- লগইন ফাংশন ---
        function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email.includes('@') && password.length >= 6) {
                userId = email.replace(/[^a-zA-Z0-9]/g, ""); 
                document.getElementById('login-screen').style.display = 'none';
                loadUserData(); // ডাটা লোড করা
                alert("Welcome, " + email);
            } else {
                document.getElementById('auth-msg').innerText = "সঠিক ইমেইল ও পাসওয়ার্ড দিন!";
            }
        }

        // --- মাইনিং লজিক (১ সেকেন্ড পর পর) ---
        setInterval(() => {
            if (userId !== "") {
                let dogsPerSec = (ghPower / 1000000); 
                pendingBalance += dogsPerSec;
                updateUI();
            }
        }, 1000);

        // --- ক্লেইম ফাংশন ---
        function claimDogs() {
            if (pendingBalance > 0) {
                dogsBalance += pendingBalance;
                pendingBalance = 0;
                updateUI();
                autoSave();
                alert("Claim Successful!");
            }
        }

        // --- উইথড্র ফাংশন ---
        function processWithdraw() {
            if (dogsBalance >= 50) {
                dogsBalance -= 50;
                updateUI();
                autoSave();
                alert("Withdrawal Successful! 50 DOGS deducted.");
            } else {
                alert("Insufficient balance! Need 50 DOGS.");
            }
        }

        // --- ডাটা সেভ এবং লোড (API) ---
        function autoSave() {
            if (userId === "") return;
            fetch(`${SERVER_URL}/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: userId,
                    dogs: dogsBalance.toFixed(4),
                    gh: ghPower,
                    refs: refCount
                })
            });
        }

        function loadUserData() {
            fetch(`${SERVER_URL}/status/${userId}`)
            .then(res => res.json())
            .then(data => {
                if (data && data.dogs) {
                    dogsBalance = parseFloat(data.dogs);
                    ghPower = data.gh;
                    refCount = data.refs;
                    updateUI();
                }
            }).catch(e => console.log("New user"));
        }

        // --- ইন্টারফেস আপডেট ---
        function updateUI() {
            document.getElementById('dogs-balance').innerText = dogsBalance.toFixed(4);
            document.getElementById('pending-balance').innerText = pendingBalance.toFixed(4);
            document.getElementById('gh-power').innerText = ghPower;
            document.getElementById('ref-count').innerText = refCount;
        }

        // ৩০ সেকেন্ড পর পর অটো সেভ
        setInterval(autoSave, 30000);
    </script>
</body>
</html>
