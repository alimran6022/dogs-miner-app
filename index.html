<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs Miner Pro - Nasim Edition</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { padding: 15px; }
        .balance-card { background: linear-gradient(145deg, #1a1a1a, #2a2a2a); padding: 20px; border-radius: 20px; margin: 15px; border: 1px solid #f39c12; }
        #dogs-balance { font-size: 35px; color: #f39c12; font-weight: bold; }
        button { width: 95%; padding: 15px; margin: 8px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-claim { background: #27ae60; color: white; }
        .btn-ad { background: #8e44ad; color: white; }
        .btn-spin { background: #e67e22; color: white; }
        .btn-ref { background: #34495e; color: white; }
        input { width: 85%; padding: 15px; margin: 10px; border-radius: 10px; background: #222; color: white; border: 1px solid #444; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0b; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen" style="display: none;">
        <h2 style="color: #f39c12;">Dogs Miner Login</h2>
        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button style="background: #f39c12; color: white;" onclick="handleAuth()">START MINING</button>
    </div>

    <div class="container">
        <h2 style="color: #f39c12;">DOGS MINER PRO</h2>
        
        <div class="balance-card">
            <p style="margin:0;">Total Balance</p>
            <div id="dogs-balance">0.0000</div>
            <p style="font-size: 13px; color: #27ae60;">Mining: +<span id="pending-balance">0.0000</span></p>
        </div>

        <div style="background: #222; padding: 10px; border-radius: 10px; margin: 10px; display: flex; justify-content: space-around;">
            <span>⚡ <b id="gh-power">100</b> GH/s</span>
            <span>🎡 <b id="spin-count">0</b> Spins</span>
        </div>

        <button class="btn-ad" onclick="watchAd()">📺 WATCH AD (Get 1 Spin)</button>
        <button class="btn-spin" onclick="luckySpin()">🎰 SPIN (Win GH Power)</button>
        <button class="btn-claim" onclick="claimDogs()">📥 CLAIM DOGS</button>
        <button class="btn-ref" onclick="copyRef()">🔗 COPY REFERRAL LINK</button>
        
        <p id="msg" style="color: yellow; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <script>
        const SERVER_URL = "https://dogs-miner-app.onrender.com";
        let userId = localStorage.getItem('dogs_user_id') || "";
        let dogsBalance = 0;
        let pendingBalance = 0;
        let ghPower = 100;
        let spinCount = 0;

        window.onload = function() {
            if (userId === "") document.getElementById('login-screen').style.display = 'flex';
            else loadUserData();
        };

        function handleAuth() {
            const email = document.getElementById('email').value;
            if (email.includes('@')) {
                userId = email.replace(/[^a-zA-Z0-9]/g, "");
                localStorage.setItem('dogs_user_id', userId);
                document.getElementById('login-screen').style.display = 'none';
                loadUserData();
            }
        }

        function watchAd() {
            document.getElementById('msg').innerText = "Loading Ad...";
            setTimeout(() => {
                spinCount += 1;
                updateUI();
                autoSave();
                document.getElementById('msg').innerText = "Ad Finished! You got 1 Lucky Spin.";
            }, 3000);
        }

        function luckySpin() {
            if (spinCount > 0) {
                spinCount--;
                const ghPrizes = [15, 10, 5, 2];
                const winGH = ghPrizes[Math.floor(Math.random() * ghPrizes.length)];
                ghPower += winGH;
                updateUI();
                autoSave();
                document.getElementById('msg').innerText = "Won " + winGH + " GH Power!";
            } else {
                alert("No spins! Watch an Ad first.");
            }
        }

        setInterval(() => {
            if (userId !== "") {
                let dogsPerSec = (ghPower / 100000) * (20000 / 86400); 
                pendingBalance += dogsPerSec;
                updateUI();
            }
        }, 1000);

        function claimDogs() {
            dogsBalance += pendingBalance;
            pendingBalance = 0;
            updateUI();
            autoSave();
        }

        function copyRef() {
            const refLink = "https://alimran6022.github.io/dogs-miner-app/?ref=" + userId;
            navigator.clipboard.writeText(refLink).then(() => {
                alert("Link Copied!");
            });
        }

        function autoSave() {
            if (userId === "") return;
            fetch(`${SERVER_URL}/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: userId, dogs: dogsBalance.toFixed(4), gh: ghPower, refs: spinCount })
            });
        }

        function loadUserData() {
            fetch(`${SERVER_URL}/status/${userId}`).then(res => res.json()).then(data => {
                if (data) {
                    dogsBalance = parseFloat(data.dogs) || 0;
                    ghPower = data.gh || 100;
                    spinCount = data.refs || 0;
                    updateUI();
                }
            });
        }

        function updateUI() {
            document.getElementById('dogs-balance').innerText = dogsBalance.toFixed(4);
            document.getElementById('pending-balance').innerText = pendingBalance.toFixed(4);
            document.getElementById('gh-power').innerText = ghPower;
            document.getElementById('spin-count').innerText = spinCount;
        }
    </script>
</body>
</html>
