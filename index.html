<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs Miner - Earn Dogs Coin</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; }
        .header { background: #1e1e1e; padding: 20px; border-bottom: 2px solid #f3ba2f; }
        .balance-container { margin: 20px; padding: 20px; background: #1e1e1e; border-radius: 15px; }
        .stats { display: flex; justify-content: space-around; margin-top: 10px; font-size: 14px; }
        .btn { background: #f3ba2f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 80%; margin: 10px; }
        .spin-wheel { width: 200px; height: 200px; border: 5px solid #f3ba2f; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; transition: transform 3s cubic-bezier(0.2, 0, 0.2, 1); }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 20px; border-radius: 15px; border: 2px solid #f3ba2f; z-index: 100; width: 80%; }
    </style>
</head>
<body><div id="login-screen" style="position:fixed; width:100%; height:100%; background:#111; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="color:white;">Dogs Miner Login</h2>
    <input type="email" id="email" placeholder="Email" style="margin:10px; padding:10px; border-radius:5px;">
    <input type="password" id="password" placeholder="Password" style="margin:10px; padding:10px; border-radius:5px;">
    <button onclick="handleAuth('login')" style="background:orange; padding:10px 20px; border-radius:5px;">Login</button>
    <p style="color:gray; font-size:12px; margin-top:10px;" onclick="handleAuth('signup')">New user? Create Account</p>
</div>
    <p style="color:gray; font-size:12px; margin-top:10px; cursor:pointer;" onclick="handleAuth()">New user? Create Account</p>
    <div class="header">
        
        <h1>DOGS MINER</h1>
    </div>

    <div class="balance-container">
        <h2><span id="dogs-balance">0.0000</span> DOGS</h2>
        <div class="stats">
            <div>⚡ Power: <span id="gh-power">100</span> GH</div>
            <div>👥 Refs: <span id="ref-count">0</span></div>
        </div>
    </div>

    <div class="spin-section">
        <div class="spin-wheel" id="wheel">SPIN</div>
        <button class="btn" onclick="startSpin()">Watch Ad to Spin</button>
    </div>

    <button class="btn" onclick="showPopup('withdraw-popup')">Withdraw</button>
    <button class="btn" style="background:#444; color:white;" onclick="copyReferral()">Invite Friends (250 GH)</button>

    <div id="withdraw-popup" class="popup">
        <h3>Withdraw DOGS</h3>
        <p>Min: 50 DOGS | Fee: 10 DOGS</p>
        <input type="text" placeholder="Enter TON Wallet Address" style="width:90%; padding:10px; margin-bottom:10px;">
        <button class="btn" onclick="processWithdraw()">Confirm Withdraw</button>
        <button class="btn" style="background:red;" onclick="closePopup('withdraw-popup')">Close</button>
    </div>

    <p>Pending: <span id="pending-balance">0.0000</span> DOGS</p>

<button onclick="claimDogs()" style="background: green; color: white; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px;">Claim Mining</button>

<button onclick="processWithdraw()" style="background: blue; color: white; padding: 10px; border-radius: 5px; border: none;">Withdraw 50 DOGS</button>
    <script>
        let dogsBalance = 0;
        let ghPower = 100; // Starting Power
        let refCount = 0;
        let userId = Math.floor(Math.random() * 1000000); // Temporary ID

    const SERVER_URL = "https://dogs-miner-app.onrender.com";

    function autoSave() {
        fetch(`${SERVER_URL}/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: userId,
                dogs: dogsBalance.toFixed(4),
                gh: ghPower,
                refs: refCount
            })
        });
    }
    setInterval(autoSave, 30000);
        
        // Mining Logic (100k GH = 20k Dogs/Day)
        setInterval(() => {
            let dogsPerSec = (ghPower / 100000) * (20000 / 86400);
            dogsBalance += dogsPerSec;
            document.getElementById('dogs-balance').innerText = dogsBalance.toFixed(4);
        }, 1000);

        // এই ফাংশনটি স্ক্রিনে সব সংখ্যা আপডেট করে
function updateUI() {
    // মেইন ব্যালেন্স আপডেট
    document.getElementById('dogs-balance').innerText = dogsBalance.toFixed(4);
    
    // মাইনিং পাওয়ার আপডেট
    document.getElementById('gh-power').innerText = ghPower;
    
    // রেফারেল কাউন্ট আপডেট
    document.getElementById('ref-count').innerText = refCount;
    
    // পেন্ডিং ব্যালেন্স আপডেট (যদি HTML-এ পেন্ডিং আইডি থাকে)
    if(document.getElementById('pending-balance')) {
        document.getElementById('pending-balance').innerText = pendingBalance.toFixed(4);
    }
}

        function startSpin() {
            // Later we will add Ad here
            let wheel = document.getElementById('wheel');
            let randomDeg = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            let pendingBalance = 0; 

function claimDogs() {
    if (pendingBalance > 0) {
        dogsBalance += pendingBalance;
        pendingBalance = 0;
        updateUI();
        autoSave();
        alert("Claim Successful!");
    } else {
        alert("Nothing to claim!");
    }
}

function processWithdraw() {
    let amount = 50; 
    if (dogsBalance >= amount) {
        dogsBalance -= amount;
        updateUI();
        autoSave();
        alert("Withdrawal Request Sent! 50 DOGS deducted.");
    } else {
        alert("Insufficient Balance!");
    }
}

/     setTimeout(() => {
                let wins = [1, 2, 5, 10, 15];
                let wonVal = wins[Math.floor(Math.random() * wins.length)];
                ghPower += wonVal;
                alert("Congratulations! You won " + wonVal + " GH Power!");
                document.getElementById('gh-power').innerText = ghPower;
            }, 3500);
        }

        function processWithdraw() {
            if (dogsBalance < 50) {
                alert("Minimum withdraw is 50 DOGS!");
                return;
            }
            alert("Request Sent! You will receive " + (dogsBalance - 10).toFixed(2) + " DOGS within 12 hours.");
        }

        function showPopup(id) { document.getElementById(id).style.display = 'block'; }
        function closePopup(id) { document.getElementById(id).style.display = 'none'; }
        
        function copyReferral() {
            let link = "https://t.me/your_bot?start=" + userId;
            alert("Referral link copied! (250 GH per ref)");
        }
function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('auth-msg');

    if (email.includes('@') && password.length >= 6) {
        // ইমেইল থেকে আইডি তৈরি (যাতে ডাটাবেসে সেভ হয়)
        userId = email.replace(/[^a-zA-Z0-9]/g, ""); 
        
        // লগইন স্ক্রিন সরিয়ে গেম ওপেন করা
        document.getElementById('login-screen').style.display = 'none';
        
        // সার্ভার থেকে পুরাতন ব্যালেন্স থাকলে তা নিয়ে আসা
        loadUserData(); 
        
        alert("Login Successful!");
    } else {
        msg.innerText = "Error: Use a valid email & 6+ character password.";
    }
}
    </script>
</body>
</html>
